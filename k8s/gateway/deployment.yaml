apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: riveroverflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: IMAGE_GATEWAY
          imagePullPolicy: Never   # kind load docker-image로 직접 로드
          ports:
            - containerPort: 8080
          env:
            - name: ENGINE_URL
              value: http://engine:9090
            - name: REDIS_ADDR
              value: redis:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: riveroverflow-secrets
                  key: JWT_SECRET
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
